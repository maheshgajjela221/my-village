name: Deploy My Village Website Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Dev Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/home/ubuntu/my-village-dev"
            REPO_URL="https://github.com/maheshgajjela221/my-village.git"
            BRANCH="dev"

            echo "===== Installing required packages if missing ====="

            if ! command -v git >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y git
            fi

            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y docker.io docker-compose-plugin
              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            if ! sudo docker compose version >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y docker-compose-plugin
            fi

            echo "===== Cloning dev branch if not exists ====="

            if [ ! -d "$APP_DIR/.git" ]; then
              cd /home/ubuntu
              sudo rm -rf my-village-dev
              git clone -b "$BRANCH" "$REPO_URL" my-village-dev
            fi

            echo "===== Pulling latest dev code ====="

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo "===== Creating dev backend .env ====="

            cat > backend/.env <<'EOF'
            ${{ secrets.DEV_BACKEND_ENV }}
            EOF

            echo "===== Building and deploying dev containers ====="

            sudo docker compose -p my-village-dev down
            sudo docker compose -p my-village-dev up -d --build

            echo "===== Cleaning old Docker images ====="

            sudo docker image prune -f

            echo "===== Dev deployment completed ====="

            sudo docker ps
